<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPM — بوابة الطالب</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    :root {
      --primary: #3c7974;
      --accent:  #6ac7bd;
      --danger:  #EF4444;
      --warning: #F59E0B;
      --success: #10B981;
    }
    body { font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif; background: #f1f9f7; }
    .bi { font-size: 1em; color: inherit; vertical-align: -0.1em; }
    .risk-dot { display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .risk-dot.high { background:#EF4444; } .risk-dot.med { background:#F59E0B; } .risk-dot.low { background:#10B981; }

    /* ─── Login Screen ─── */
    #loginScreen {
      min-height: 100vh;
      background: linear-gradient(135deg, #3c7974 0%, #4a9490 60%, #6ac7bd 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: white; border-radius: 20px; padding: 40px 36px;
      width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-input {
      width: 100%; padding: 12px 14px; border: 2px solid #E5E7EB;
      border-radius: 10px; font-size: 15px; text-align: right;
      outline: none; transition: border 0.2s; font-family: inherit;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--primary); color: white;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; font-family: inherit;
    }
    .login-btn:hover { background: #6ac7bd; }

    /* ─── Dashboard ─── */
    #dashboard { display: none; }

    /* ── Modern Glass Nav ── */
    .spm-nav {
      position: sticky; top: 0; z-index: 500;
      height: 62px; padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(60,121,116,0.92);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      animation: spmNavIn 0.55s cubic-bezier(0.16,1,0.3,1) both;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .spm-nav.scrolled { background: rgba(60,121,116,0.98); box-shadow: 0 4px 32px rgba(0,0,0,0.4); }
    @keyframes spmNavIn {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .spm-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; flex-shrink: 0; }
    .spm-logo {
      background: linear-gradient(135deg,#6ac7bd,#3c7974);
      border-radius: 10px; padding: 6px 11px;
      font-weight: 900; font-size: 13px; letter-spacing: 1.5px; color: #3c7974;
      box-shadow: 0 0 18px rgba(106,199,189,0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .spm-brand:hover .spm-logo { transform: scale(1.1) rotate(-3deg); box-shadow: 0 0 28px rgba(106,199,189,0.65); }
    .spm-brand-text { display: flex; flex-direction: column; }
    .spm-brand-name { font-weight: 700; font-size: 14.5px; line-height: 1.25; }
    .spm-brand-sub  { font-size: 10px; opacity: 0.4; }
    .spm-pill-track {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.06);
      border-radius: 50px; padding: 4px 5px; gap: 2px;
      border: 1px solid rgba(255,255,255,0.09);
    }
    .spm-link {
      padding: 7px 16px; border-radius: 50px;
      font-size: 12.5px; font-weight: 600; text-decoration: none;
      color: rgba(255,255,255,0.52);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
    }
    .spm-link:hover { color: white; background: rgba(255,255,255,0.11); transform: translateY(-1px); }
    .spm-link.active { color: white; background: rgba(255,255,255,0.18); box-shadow: 0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.12); }
    .spm-nav-actions { display: flex; align-items: center; gap: 6px; }
    .spm-act-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 13px; border-radius: 10px;
      font-size: 12.5px; font-weight: 600; font-family: inherit;
      cursor: pointer; border: 1px solid transparent; transition: all 0.2s ease;
    }
    .spm-act-logout { background: rgba(239,68,68,0.12); color: #fca5a5; border-color: rgba(239,68,68,0.22); }
    .spm-act-logout:hover { background: rgba(239,68,68,0.25); transform: translateY(-1px); }
    .spm-hamburger {
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 5px; width: 40px; height: 40px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; cursor: pointer; transition: background 0.2s;
    }
    .spm-hamburger:hover { background: rgba(255,255,255,0.18); }
    .spm-hamburger span {
      display: block; width: 18px; height: 2px; background: white; border-radius: 2px;
      transition: transform 0.3s cubic-bezier(0.23,1,0.32,1), opacity 0.25s; transform-origin: center;
    }
    .spm-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .spm-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .spm-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .spm-mobile-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(20,40,38,0.97); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.32s ease;
    }
    .spm-mobile-overlay.open { opacity: 1; pointer-events: all; }
    .spm-mob-close {
      position: absolute; top: 18px; left: 18px; width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: white; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background 0.2s;
    }
    .spm-mob-close:hover { background: rgba(255,255,255,0.18); }
    .spm-mob-links { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; padding: 0 28px; }
    .spm-mob-link {
      display: block; width: 100%; max-width: 340px; padding: 16px 24px;
      border-radius: 14px; font-size: 16px; font-weight: 700; text-align: center;
      text-decoration: none; color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07);
      opacity: 0; transform: translateY(24px); transition: all 0.28s ease;
    }
    .spm-mobile-overlay.open .spm-mob-link { opacity: 1; transform: translateY(0); }
    .spm-mobile-overlay.open .spm-mob-link:nth-child(1) { transition-delay: 0.06s; }
    .spm-mobile-overlay.open .spm-mob-link:nth-child(2) { transition-delay: 0.12s; }
    .spm-mobile-overlay.open .spm-mob-link:nth-child(3) { transition-delay: 0.18s; }
    .spm-mobile-overlay.open .spm-mob-link:nth-child(4) { transition-delay: 0.24s; }
    .spm-mobile-overlay.open .spm-mob-link:nth-child(5) { transition-delay: 0.30s; }
    .spm-mob-link:hover { background: rgba(255,255,255,0.1); color: white; transform: translateX(-4px); }
    .spm-mob-link.active { background: rgba(106,199,189,0.12); border-color: rgba(106,199,189,0.25); color: #6ac7bd; }
    @media (max-width: 768px) {
      .spm-nav { padding: 0 14px !important; }
      .spm-pill-track { display: none; }
      .spm-brand-sub  { display: none; }
      .spm-hamburger  { display: flex; }
      .spm-hide-mob   { display: none !important; }
    }
    .card { background: white; border-radius: 14px; box-shadow: 0 2px 14px rgba(0,0,0,0.07); }
    .stat-card {
      background: white; border-radius: 14px; padding: 20px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.07); text-align: center;
    }

    /* Skill bars */
    .skill-row { margin-bottom: 18px; }
    .skill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .skill-label { font-size: 14px; font-weight: 600; color: #374151; }
    .skill-pct   { font-size: 13px; font-weight: 700; }
    .skill-bg    { background: #E5E7EB; border-radius: 999px; height: 12px; }
    .skill-fill  { height: 12px; border-radius: 999px; transition: width 0.8s ease; }

    /* Action items */
    .action-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px; border-radius: 10px; margin-bottom: 10px;
      border: 1px solid #E5E7EB;
    }
    .action-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .action-urgent { background: #FFF5F5; border-color: #FECACA; }
    .action-normal { background: #F0FDF4; border-color: #BBF7D0; }
    .action-tip    { background: #EFF6FF; border-color: #BFDBFE; }

    /* Badge */
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
    }
    .badge-high { background:#FEE2E2; color:#DC2626; }
    .badge-med  { background:#FEF3C7; color:#D97706; }
    .badge-low  { background:#D1FAE5; color:#059669; }

    /* Progress steps */
    .step {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 12px 0; border-bottom: 1px dashed #E5E7EB;
    }
    .step:last-child { border-bottom: none; }
    .step-circle {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .step-done   { background: #D1FAE5; color: #059669; }
    .step-active { background: #DBEAFE; color: #1D4ED8; }
    .step-todo   { background: #F3F4F6; color: #9CA3AF; }

    /* Radar chart container */
    .radar-wrap { max-width: 260px; margin: 0 auto; }

    /* Motivational banner */
    .motivation-banner {
      background: linear-gradient(135deg, #3c7974, #4a9490);
      color: white; border-radius: 14px; padding: 20px 24px;
      display: flex; align-items: center; gap: 16px;
    }

    /* logout btn */
    .logout-btn {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 6px 14px; border-radius: 8px; font-size: 13px;
      cursor: pointer; transition: background 0.2s; font-family: inherit;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.25); }

    @media (max-width: 768px) {
      #studentBody { padding: 16px 12px !important; }
      .login-card { width: 92vw !important; padding: 28px 20px !important; }
      #dashboard > div[style*="max-width:1100px"] { padding: 16px 12px !important; }

      /* Motivation banner: stack on small screens */
      .motivation-banner { flex-direction: column; gap: 10px; text-align: center; padding: 16px; }

      /* 4-col stat cards → 2×2 */
      #studentBody .grid[style*="grid-template-columns:repeat(4,1fr)"] {
        grid-template-columns: 1fr 1fr !important;
      }
      /* 2-col grids (skills+grades, action+roadmap) → 1-col */
      #studentBody .grid[style*="grid-template-columns:1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
      /* Reduce stat font sizes */
      .stat-card > div:first-child { font-size: 24px !important; }

      /* Progress chart: shorter on mobile */
      #studentBody canvas { max-height: 220px; }

      /* Step layout inside roadmap */
      .step { padding: 10px 0; }
    }

    @media (max-width: 480px) {
      /* On very small phones, stack 4 stat cards to 1-col */
      #studentBody .grid[style*="grid-template-columns:repeat(4,1fr)"] {
        grid-template-columns: 1fr 1fr !important;
      }
      .login-card { padding: 24px 16px !important; }
    }

    /* ── Quiz Styles ── */
    .q-opt {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 2px solid #E5E7EB; background: white; cursor: pointer;
      text-align: right; font-size: 14px; font-family: inherit; color: #374151;
      transition: border-color 0.18s, background 0.18s;
      display: block; margin-bottom: 9px; line-height: 1.5;
    }
    .q-opt:hover:not([disabled]) { border-color: var(--accent); background: #f0fdfb; }
    .q-opt.chosen   { border-color: var(--primary); background: #e6f4f3; font-weight: 600; color: #111827; }
    .q-opt.correct  { border-color: #10B981 !important; background: #D1FAE5 !important; }
    .q-opt.wrong    { border-color: #EF4444 !important; background: #FEE2E2 !important; }
    .q-opt[disabled]{ cursor: default; }
    .quiz-bar { height: 8px; background: #E5E7EB; border-radius: 999px; overflow: hidden; margin-bottom: 18px; }
    .quiz-bar-fill { height: 100%; background: var(--primary); border-radius: 999px; transition: width 0.4s; }
    .skill-badge-q { font-size: 11px; font-weight: 700; padding: 3px 10px; background: var(--accent); color: white; border-radius: 999px; }
    .q-nav-btn {
      padding: 9px 20px; border-radius: 10px; font-size: 13px;
      font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.18s;
    }
  </style>
</head>

// ── helpers ──────────────────────────────────────────────
function skillColor(s){ return s>=70?'#10B981':s>=40?'#F59E0B':'#EF4444'; }
function skillLabel(s){ return s>=70?'متقدم':s>=40?'متوسط':'يحتاج تحسين'; }
function riskLabel(r){  return r==='high'?'مرتفع':r==='medium'?'متوسط':'منخفض'; }
function riskBadge(r){  return r==='high'?'badge-high':r==='medium'?'badge-med':'badge-low'; }
function riskEmoji(r){  return r==='high'?'🔴':r==='medium'?'🟡':'🟢'; }
function totalPct(g){
  const t = g.assignments.score + g.midterms.score + g.participation.score;
  const m = g.assignments.max   + g.midterms.max   + g.participation.max;
  return Math.round(t/m*100);
}
function overallSkill(skills){ return Math.round(skills.reduce((a,b)=>a+b.score,0)/skills.length); }

let activeChart = null;

// ── LOGIN ─────────────────────────────────────────────────
function doLogin(){
  const id = document.getElementById('studentSelect').value;
  if(!id){ alert('يرجى اختيار الرقم الجامعي'); return; }
  const s = students.find(x=>x.id==id);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display   = 'block';
  document.getElementById('headerName').textContent = s.name;
  document.getElementById('headerSub').textContent  = s.studentId + ' • ' + s.major + ' • ' + s.level;
  renderStudentDashboard(s);
}

function doLogout(){
  document.getElementById('dashboard').style.display   = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('studentSelect').value = '';
  if(activeChart){ activeChart.destroy(); activeChart = null; }
}

      <!-- Results -->
      <div id="quizResultsDiv" style="display:none;"></div>
    </div>
  `;

  // ── Init quiz for this student ──
  currentStudent = s;
  initQuizSection(s);

  // ── Progress Chart ──
  if(activeChart){ activeChart.destroy(); }
  const labels = s.progress.map(p=>p.label);
  const before = s.progress.map(p=>p.before);
  const after  = s.progress.map(p=>p.after);
  activeChart = new Chart(document.getElementById('progressChart'),{
    type:'line',
    data:{
      labels,
      datasets:[
        {
          label:'قبل التدريب',
          data: before,

  });
}

function initQuizSection(s) {
  const prev = JSON.parse(localStorage.getItem('spm_quiz_' + s.id) || 'null');
  const banner = document.getElementById('prevResultBanner');
  if (!prev || !banner) return;
  const col = prev.score >= 80 ? '#10B981' : prev.score >= 60 ? '#F59E0B' : '#EF4444';
  banner.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;background:${col}12;border:1px solid ${col}35;border-radius:10px;padding:12px 14px;margin-bottom:12px;">
      <div>
        <div style="font-size:13px;font-weight:700;color:${col};">آخر نتيجة: ${prev.score}% — ${prev.date}</div>
        <div style="font-size:11px;color:#6B7280;margin-top:2px;">يمكنك إعادة الاختبار لتتبع تحسنك</div>
      </div>
      <div style="font-size:26px;font-weight:900;color:${col};">${prev.score}%</div>
    </div>`;
}

function startQuiz() {
  // Select 10 questions: 2-3 from each skill area
  const bySkill = {};
  QUIZ_BANK.forEach(q => { if (!bySkill[q.skill]) bySkill[q.skill] = []; bySkill[q.skill].push(q); });
  let selected = [];
  Object.values(bySkill).forEach(qs => {
    const shuffled = [...qs].sort(() => Math.random() - 0.5);
    selected.push(shuffled[0], shuffled[1]);  // 2 per skill = 8
  });
  // Add 2 random from remaining
  const remaining = QUIZ_BANK.filter(q => !selected.includes(q)).sort(() => Math.random() - 0.5);
  selected.push(...remaining.slice(0, 2));
  selected = selected.sort(() => Math.random() - 0.5);

  quizState = { questions: selected, answers: new Array(selected.length).fill(null), currentIdx: 0 };
  quizTimerVal = 600;
  quizTimerInt = setInterval(tickQuizTimer, 1000);

  document.getElementById('quizIntro').style.display  = 'none';
  document.getElementById('quizActive').style.display = 'block';
  renderQuestion(0);
}

function tickQuizTimer() {
  quizTimerVal--;
  const m = Math.floor(quizTimerVal / 60);
  const s = quizTimerVal % 60;
  const el = document.getElementById('qTimer');
  if (el) el.textContent = m + ':' + String(s).padStart(2, '0');
  if (el) el.style.color = quizTimerVal <= 60 ? '#EF4444' : '#374151';
  if (quizTimerVal <= 0) { clearInterval(quizTimerInt); submitQuiz(); }
}

function renderQuestion(idx) {
  const q = quizState.questions[idx];
  const total = quizState.questions.length;
  document.getElementById('qNum').textContent  = 'السؤال ' + (idx + 1) + ' من ' + total;
  document.getElementById('qSkill').textContent = q.skill;
  document.getElementById('qText').textContent  = q.q;
  document.getElementById('qBar').style.width   = (idx / total * 100) + '%';

  const chosen = quizState.answers[idx];
  document.getElementById('qOptions').innerHTML = q.opts.map((opt, i) =>
    `<button class="q-opt${chosen === i ? ' chosen' : ''}" onclick="selectOpt(${i})">${opt}</button>`
  ).join('');

  const nextBtn   = document.getElementById('qNextBtn');
  const prevBtn   = document.getElementById('qPrevBtn');
  const submitBtn = document.getElementById('qSubmitBtn');
  const isLast = idx === total - 1;
  nextBtn.disabled      = chosen === null;
  nextBtn.style.opacity = chosen === null ? '0.4' : '1';
  nextBtn.innerHTML     = isLast ? '' : 'التالي ←';
  nextBtn.style.display = isLast ? 'none' : '';
  prevBtn.disabled      = idx === 0;
  prevBtn.style.opacity = idx === 0 ? '0.4' : '1';
  if (submitBtn) {
    submitBtn.style.display = isLast ? 'block' : 'none';
    submitBtn.disabled      = chosen === null;
    submitBtn.style.opacity = chosen === null ? '0.5' : '1';
  }
}

function selectOpt(i) {
  quizState.answers[quizState.currentIdx] = i;
  document.querySelectorAll('.q-opt').forEach((btn, bi) => {
    btn.classList.toggle('chosen', bi === i);
  });
  const nextBtn   = document.getElementById('qNextBtn');
  const submitBtn = document.getElementById('qSubmitBtn');
  nextBtn.disabled = false;
  nextBtn.style.opacity = '1';
  if (submitBtn && submitBtn.style.display !== 'none') {
    submitBtn.disabled = false;
    submitBtn.style.opacity = '1';
  }
}

function confirmSubmitQuiz() {
  submitQuiz();
}

function prevQ() {
  if (quizState.currentIdx > 0) { quizState.currentIdx--; renderQuestion(quizState.currentIdx); }
}

function nextQ() {
  if (quizState.answers[quizState.currentIdx] === null) return;
  if (quizState.currentIdx === quizState.questions.length - 1) { submitQuiz(); return; }
  quizState.currentIdx++;
  renderQuestion(quizState.currentIdx);
}

function submitQuiz() {
  clearInterval(quizTimerInt);
  const { questions, answers } = quizState;
  const skillC = {}, skillOK = {};
  let correct = 0;
  questions.forEach((q, i) => {
    if (!skillC[q.skill])  { skillC[q.skill] = 0; skillOK[q.skill] = 0; }
    skillC[q.skill]++;
    if (answers[i] === q.ans) { correct++; skillOK[q.skill]++; }
  });
  const score = Math.round(correct / questions.length * 100);
  const skillPcts = {};
  Object.keys(skillC).forEach(k => { skillPcts[k] = Math.round(skillOK[k] / skillC[k] * 100); });
  const weakAreas = Object.entries(skillPcts).filter(([,v]) => v < 70).sort((a,b) => a[1]-b[1]).map(([k]) => k);

  const result = {
    studentId: currentStudent.id, studentName: currentStudent.name,
    date: new Date().toLocaleDateString('ar-SA'),
    score, correct, total: questions.length, skillPcts, weakAreas,
  };
  localStorage.setItem('spm_quiz_' + currentStudent.id, JSON.stringify(result));
  // Global list for advisor
  let all = JSON.parse(localStorage.getItem('spm_all_quiz_results') || '[]');
  all = all.filter(r => r.studentId !== currentStudent.id);
  all.unshift(result);
  localStorage.setItem('spm_all_quiz_results', JSON.stringify(all));

  showQuizResults(result);
}

function showQuizResults(result) {
  document.getElementById('quizActive').style.display = 'none';
  const div = document.getElementById('quizResultsDiv');
  div.style.display = 'block';

  const levels = [
    { min:80, label:'جاهز للاختبار',       col:'#10B981', msg:'أنت جاهز! يمكنك تقديم الاختبار الآن.',                              wks:0 },
    { min:60, label:'قريب من الجاهزية',      col:'#F59E0B', msg:'تحتاج 1–2 أسبوع للتركيز على النقاط الضعيفة.',                    wks:2 },
    { min:40, label:'بحاجة لتحضير إضافي 📚',   col:'#F97316', msg:'يُنصح بمراجعة شاملة للمحاور الضعيفة لمدة 3–4 أسابيع.',           wks:4 },
    { min:0,  label:'تحتاج دعماً أكاديمياً 🤝', col:'#EF4444', msg:'يُنصح بزيارة مرشدك الأكاديمي وإعداد خطة دراسية مكثفة (4–6 أسابيع).', wks:6 },
  ];
  const lv = levels.find(l => result.score >= l.min);

  div.innerHTML = `
    <div style="text-align:center;padding:24px;background:linear-gradient(135deg,${lv.col}18,${lv.col}06);border-radius:14px;margin-bottom:20px;border:2px solid ${lv.col}30;">
      <div style="font-size:54px;font-weight:900;color:${lv.col};line-height:1;">${result.score}%</div>
      <div style="font-size:17px;font-weight:700;color:${lv.col};margin:8px 0;">${lv.label}</div>
      <div style="font-size:13px;color:#6B7280;">${result.correct} من ${result.total} إجابة صحيحة</div>
    </div>

    <div style="margin-bottom:20px;">
      <div style="font-size:14px;font-weight:700;color:#111827;margin-bottom:12px;"><i class="bi bi-bar-chart-fill"></i> النتيجة حسب المهارة</div>
      ${Object.entries(result.skillPcts).map(([sk,pct]) => `
        <div style="margin-bottom:11px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:5px;">
            <span>${sk}</span><span style="color:${pct>=70?'#10B981':pct>=50?'#F59E0B':'#EF4444'};">${pct}%</span>
          </div>
          <div class="quiz-bar"><div class="quiz-bar-fill" style="width:${pct}%;background:${pct>=70?'#10B981':pct>=50?'#F59E0B':'#EF4444'};"></div></div>
        </div>`).join('')}
    </div>

    ${result.weakAreas.length ? `
    <div style="margin-bottom:20px;">
      <div style="font-size:14px;font-weight:700;color:#111827;margin-bottom:10px;"><i class="bi bi-lightbulb-fill"></i> نقاط تحتاج تقوية وطرق تحسينها</div>
      ${result.weakAreas.slice(0,2).map(area => `
        <div style="background:#FFFBEB;border-right:3px solid #F59E0B;border-radius:10px;padding:14px;margin-bottom:10px;">
          <div style="font-size:13px;font-weight:700;color:#92400E;margin-bottom:8px;"><i class="bi bi-lightning-fill"></i> مهارة ${area} — ${result.skillPcts[area]}%</div>
          ${(QUIZ_RECS[area]||[]).map(t=>`<div style="font-size:12px;color:#78350F;padding:2px 0;">• ${t}</div>`).join('')}
        </div>`).join('')}
    </div>` : ''}

    <div style="background:#EFF6FF;border-right:3px solid #3B82F6;border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="font-size:13px;font-weight:700;color:#1D4ED8;margin-bottom:4px;"><i class="bi bi-calendar-event-fill"></i> توصية موعد الاختبار الفعلي</div>
      <div style="font-size:13px;color:#1E40AF;">${lv.msg}</div>
      ${lv.wks ? `<div style="font-size:12px;color:#3B82F6;margin-top:4px;font-weight:600;">الوقت المقترح: ${lv.wks} أسابيع من الآن</div>` : ''}
    </div>

    <div style="background:#F0FDF4;border-right:3px solid #10B981;border-radius:10px;padding:12px;margin-bottom:20px;">
      <div style="font-size:13px;font-weight:700;color:#065F46;margin-bottom:2px;">📨 تمت مشاركة نتيجتك مع مرشدك الأكاديمي</div>
      <div style="font-size:12px;color:#047857;">سيتمكن مرشدك من مشاهدة نتيجتك ومتابعة تطورك في لوحة التحكم.</div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button onclick="retakeQuiz()" style="flex:1;min-width:130px;padding:11px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">🔄 إعادة الاختبار</button>
      <button onclick="toggleReview(this)" style="flex:1;min-width:130px;padding:11px;background:white;border:2px solid #E5E7EB;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#374151;"><i class="bi bi-clipboard-fill"></i> مراجعة الإجابات</button>
    </div>
    <div id="reviewDiv" style="display:none;margin-top:18px;"></div>
  `;
}

function retakeQuiz() {
  document.getElementById('quizResultsDiv').style.display = 'none';
  document.getElementById('quizIntro').style.display = 'block';
  initQuizSection(currentStudent);
}

function toggleReview(btn) {
  const div = document.getElementById('reviewDiv');
  if (div.style.display === 'block') { div.style.display = 'none'; btn.innerHTML = '<i class="bi bi-clipboard-fill"></i> مراجعة الإجابات'; return; }
  btn.textContent = '▲ إخفاء المراجعة';
  const { questions, answers } = quizState;
  div.innerHTML = `
    <div style="font-size:14px;font-weight:700;color:#111827;margin-bottom:12px;"><i class="bi bi-clipboard-fill"></i> مراجعة الإجابات</div>
    ${questions.map((q,i) => {
      const ua = answers[i]; const ok = ua === q.ans;
      return `<div style="border:2px solid ${ok?'#10B981':'#EF4444'};border-radius:10px;padding:14px;margin-bottom:10px;background:${ok?'#F0FDF4':'#FFF5F5'};">
        <div style="font-size:11px;font-weight:700;color:#6B7280;margin-bottom:4px;">${i+1}. ${q.skill} <i class="bi ${ok?'bi-check-circle-fill" style="color:#10B981':'bi-x-circle-fill" style="color:#EF4444'}"></i></div>
        <div style="font-size:13px;font-weight:600;color:#111827;margin-bottom:8px;">${q.q}</div>
        ${ua !== null && !ok ? `<div style="font-size:12px;color:#EF4444;margin-bottom:4px;">إجابتك: ${q.opts[ua]}</div>` : ''}
        <div style="font-size:12px;color:#10B981;margin-bottom:6px;">✓ الصحيحة: ${q.opts[q.ans]}</div>
        <div style="font-size:11px;color:#6B7280;background:white;padding:8px;border-radius:6px;line-height:1.6;"><i class="bi bi-lightbulb-fill" style="color:#F59E0B;"></i> ${q.exp}</div>
      </div>`;
    }).join('')}`;
  div.style.display = 'block';
}

// Also support ?id= param for direct link from advisor dashboard
const params = new URLSearchParams(window.location.search);
const paramId = params.get('id');
if(paramId){
  document.getElementById('studentSelect').value = paramId;
  doLogin();
}

// ── Mobile nav overlay ──
function toggleMobileMenu() {
  const ov = document.getElementById('spmOverlay');
  const hb = document.getElementById('spmHamburger');
  const isOpen = ov.classList.toggle('open');
  hb.classList.toggle('open', isOpen);
  document.body.style.overflow = isOpen ? 'hidden' : '';
}

// ── Nav scroll effect ──
window.addEventListener('scroll', () => {
  const nav = document.getElementById('spmNav');
  if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
});
</script>
</body>
</html>
